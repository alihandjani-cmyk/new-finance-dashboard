name: Update Dashboard Data — Full

on:
  workflow_dispatch:   # triggered by cron-job.org (4× daily) and manual runs
  schedule:
    - cron: '15 22 * * 1-5'   # backup full run — keeps data flowing if cron-job.org ever lapses

concurrency:
  group: dashboard-full
  cancel-in-progress: false    # never cancel a running full update

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40   # 9 exchanges (Wikipedia + yfinance per exchange) — 20min was too tight after TSE/HKG/KRX

    permissions:
      contents: write          # needed to push dashboard_data.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python updater.py

      - name: Commit & push dashboard_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the freshly generated file before pulling (avoids stash-pop conflicts
          # when a fast-mode run commits while this full run is executing).
          cp dashboard_data.json /tmp/dashboard_data_new.json
          git checkout -- dashboard_data.json
          git pull --rebase origin main
          cp /tmp/dashboard_data_new.json dashboard_data.json
          git add dashboard_data.json
          git diff --cached --quiet || git commit -m "chore: full update — dashboard data [skip ci]"
          git push
